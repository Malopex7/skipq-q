<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Real-time Queue Tracker</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#80f20d",
                        "background-light": "#f7f8f5",
                        "background-dark": "#192210",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex justify-center items-center min-h-screen">
<div class="relative flex min-h-[812px] w-full max-w-[375px] flex-col bg-white dark:bg-slate-900 shadow-2xl overflow-hidden">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2 justify-between border-b border-slate-100 dark:border-slate-800">
<button class="flex size-12 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12 text-[#0a192f] dark:text-slate-100">Queue Tracker</h2>
</div>
<div class="flex-1 overflow-y-auto pb-6">
<!-- Runner Info Card -->
<div class="p-4 mx-4 mt-6 bg-slate-50 dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
<div class="flex items-center justify-between gap-4">
<div class="flex items-center gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-16 w-16 shadow-sm border-2 border-white dark:border-slate-700" data-alt="Portrait of runner Sipho" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDZskGqM_5GSB4w3dz8yn5EcSB34ly8vRXjsfVZKbmQOVSyhc4gV9CYjSDneGt8AX_yMKVCJyMEWvTbKJoRo9hzZLsIFbEwGNRklI-PtDEUxOwOcCxh7QmuFawx22_q5_Af001s7ESi9vMoLTQIByPNWIpp3SbypTn6sJe-HpqbbY8QUUtYh81GU67Ti0wRzAs0PsW_N7DkdobFrVst38J-8q6mErowocLSm0gv8HpGtlnU_vHaKJLJ0rfEtExehLbI_OiesXZVbLY");'></div>
<div class="flex flex-col justify-center">
<p class="text-[20px] font-bold leading-tight tracking-[-0.015em] text-[#0a192f] dark:text-slate-100">Sipho</p>
<div class="flex items-center gap-1 mt-1 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-sm text-yellow-400" style="font-variation-settings: 'FILL' 1;">star</span>
<p class="text-sm font-medium leading-normal">4.9</p>
</div>
</div>
</div>
<button class="flex items-center justify-center gap-2 rounded-full h-10 px-4 bg-primary text-[#0a192f] text-sm font-bold shadow-sm hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-lg">chat</span>
<span>Chat</span>
</button>
</div>
</div>
<!-- ETA Display -->
<div class="flex flex-col items-center justify-center py-8">
<p class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">ETA to Front</p>
<h1 class="text-[#0a192f] dark:text-slate-100 tracking-tight text-[40px] font-bold leading-tight text-center">~45 mins</h1>
</div>
<!-- Progress Tracker -->
<div class="px-8 py-4">
<div class="relative pl-6 border-l-2 border-slate-200 dark:border-slate-700 space-y-8">
<!-- Step 1: Accepted -->
<div class="relative">
<div class="absolute -left-[35px] top-1 flex size-4 items-center justify-center rounded-full bg-slate-300 dark:bg-slate-600 border-2 border-white dark:border-slate-900">
<span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex flex-col">
<h3 class="text-base font-medium text-slate-500 dark:text-slate-400">Accepted</h3>
</div>
</div>
<!-- Step 2: En Route -->
<div class="relative">
<div class="absolute -left-[35px] top-1 flex size-4 items-center justify-center rounded-full bg-slate-300 dark:bg-slate-600 border-2 border-white dark:border-slate-900">
<span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex flex-col">
<h3 class="text-base font-medium text-slate-500 dark:text-slate-400">En Route</h3>
</div>
</div>
<!-- Step 3: Arrived -->
<div class="relative">
<div class="absolute -left-[35px] top-1 flex size-4 items-center justify-center rounded-full bg-slate-300 dark:bg-slate-600 border-2 border-white dark:border-slate-900">
<span class="material-symbols-outlined text-[10px] text-white" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex flex-col">
<h3 class="text-base font-medium text-slate-500 dark:text-slate-400">Arrived</h3>
</div>
</div>
<!-- Step 4: Waiting (Active) -->
<div class="relative">
<div class="absolute -left-[39px] top-0 flex size-6 items-center justify-center rounded-full bg-primary border-4 border-white dark:border-slate-900 shadow-[0_0_0_4px_rgba(128,242,13,0.2)]">
<div class="size-2 rounded-full bg-white"></div>
</div>
<div class="flex flex-col">
<h3 class="text-lg font-bold text-[#0a192f] dark:text-slate-100">Waiting in Line</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Currently at position #12</p>
</div>
</div>
<!-- Step 5: Near Front -->
<div class="relative">
<div class="absolute -left-[33px] top-1.5 flex size-3 items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="flex flex-col">
<h3 class="text-base font-medium text-slate-400 dark:text-slate-500">Near Front</h3>
</div>
</div>
<!-- Step 6: Complete -->
<div class="relative">
<div class="absolute -left-[33px] top-1.5 flex size-3 items-center justify-center rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="flex flex-col">
<h3 class="text-base font-medium text-slate-400 dark:text-slate-500">Complete</h3>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900">
<button class="flex w-full items-center justify-center rounded-xl h-12 px-4 bg-slate-100 dark:bg-slate-800 text-[#0a192f] dark:text-slate-100 text-sm font-bold leading-normal hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-lg mr-2">edit_note</span>
<span>Update Instructions</span>
</button>
</div>
</div>
</body></html>
