<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Runner Onboarding Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full max-w-[480px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header Section -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer" data-icon="ArrowLeft">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Onboarding</h2>
</div>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Step 1 of 5</p>
</div>
<div class="rounded-full bg-slate-200 dark:bg-slate-800 h-2 overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 20%;"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Personal Details</p>
</div>
<!-- Content Header -->
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold leading-tight px-4 text-left pb-2 pt-5">Personal Details</h3>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pb-6 pt-1 px-4">Please provide your basic information to get started as a SkipQ runner.</p>
<!-- Form Fields -->
<div class="flex flex-col gap-6 px-4 py-3">
<!-- Full Name -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Full Name</p>
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal shadow-sm" placeholder="Enter your full name" type="text" value=""/>
</label>
<!-- Phone Number -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Phone Number</p>
<div class="flex gap-2">
<div class="flex items-center justify-center px-4 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 text-base font-medium">
                        +27
                    </div>
<input class="form-input flex-1 min-w-0 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal shadow-sm" placeholder="71 234 5678" type="tel" value=""/>
</div>
</label>
<!-- South African ID Number -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">South African ID Number</p>
<input class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal shadow-sm" placeholder="Enter 13-digit ID number" type="text" value=""/>
</label>
</div>
<!-- Footer Actions -->
<div class="mt-auto p-4 flex flex-col gap-4">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white text-lg font-bold rounded-xl transition-colors shadow-lg flex items-center justify-center gap-2">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full py-2 text-primary dark:text-primary font-medium text-sm hover:underline transition-all">
                Back to Login
            </button>
</div>
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
