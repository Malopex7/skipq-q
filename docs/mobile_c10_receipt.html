<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1152d4", // Navy-ish Blue
            "success": "#84cc16", // Lime Green
            "background-light": "#f6f6f8",
            "background-dark": "#101622",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .material-symbols-outlined.fill {
      font-variation-settings: 'FILL' 1;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="relative flex h-full min-h-screen w-full max-w-[430px] flex-col bg-white dark:bg-slate-900 shadow-2xl overflow-x-hidden">
<!-- Top Nav -->
<div class="flex items-center p-4 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight flex-1 text-center pr-10">Job Completion</h2>
</div>
<!-- Celebration Header -->
<div class="flex flex-col items-center pt-8 pb-4">
<div class="w-20 h-20 bg-success rounded-full flex items-center justify-center mb-4 shadow-lg shadow-success/20">
<span class="material-symbols-outlined text-white text-5xl">check</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-[28px] font-extrabold leading-tight px-4 text-center">Queue Complete!</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-1">Your spot was secured by Sipho</p>
</div>
<!-- Summary Card -->
<div class="px-6 py-4">
<div class="flex flex-col items-stretch justify-start rounded-xl shadow-md border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 overflow-hidden">
<div class="w-full bg-center bg-no-repeat aspect-[16/7] bg-cover" data-alt="Modern government building interior with queue lines" data-location="Randburg" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAu-mwQmo6jnCjNeQGiU_Yd3XEfYTZZVMp9o8lofTLM48RKg31KR4C6EgXXd_GGtoc_F2Lx8HyW0UZQ15dJLjtcG9kHfzWDsZvFHVKoTQzZWAwE3U2dyhgPAaEMeqsFr49yCuSwTFQltbkzVZpZuQ6Jcd_-ZpAvcHIYrdQ4id5xtk87PIa66Rf7Gk6qMSLPtphcCG3FD7dqHJeTGV34UlLJHXZOYYCfNUThEYWhnl_XSXnDL9ql2Hls-nu6oXGlVwawWNn-wH7PikE");'></div>
<div class="flex w-full flex-col p-5">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight">Home Affairs - Randburg</h3>
<div class="mt-4 space-y-2">
<div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">person</span>
<p class="text-sm font-medium leading-normal">Runner: <span class="text-slate-900 dark:text-slate-100">Sipho</span></p>
</div>
<div class="flex items-center gap-2 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">schedule</span>
<p class="text-sm font-medium leading-normal">Duration: <span class="text-slate-900 dark:text-slate-100">3h 15m</span></p>
</div>
<div class="flex items-center justify-between pt-3 border-t border-slate-100 dark:border-slate-700 mt-2">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">Total Cost</p>
<p class="text-primary dark:text-blue-400 text-xl font-extrabold">R150.00</p>
</div>
</div>
</div>
</div>
</div>
<!-- Rating Section -->
<div class="px-6 py-4 flex flex-col gap-4">
<div class="flex flex-col items-center">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight mb-4">Rate your runner</h3>
<div class="flex gap-2">
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-4xl cursor-pointer">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-4xl cursor-pointer">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-4xl cursor-pointer">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-4xl cursor-pointer">star</span>
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-4xl cursor-pointer">star</span>
</div>
</div>
<div class="flex flex-col gap-2">
<textarea class="w-full p-4 text-sm rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary dark:text-slate-100" placeholder="Leave a comment (optional)" rows="3"></textarea>
</div>
<div class="flex items-center justify-center gap-2 py-2">
<span class="material-symbols-outlined text-slate-400 text-lg">credit_card</span>
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium">Payment confirmed via Visa •••• 1234</p>
</div>
</div>
<!-- Actions -->
<div class="mt-auto px-6 pb-10 space-y-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
        Book Another Queue
      </button>
<button class="w-full bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-bold py-4 rounded-xl transition-all hover:bg-slate-50 dark:hover:bg-slate-800">
        Back to Home
      </button>
</div>
</div>
</body></html>
